<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barcode Label Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
</head>
<body>

  <h1>🏷️ Barcode Label Generator</h1>
  <p class="subtitle">Generate vector SVG barcodes ready for print</p>

  <div class="card">

    <!-- IMAGE UPLOAD -->
    <div class="section-title">Label Image (optional)</div>
    <div class="field upload-area" id="uploadArea">
      <input type="file" id="imgUpload" accept="image/*" onchange="handleImage(event)">
      <span id="uploadLabel">📁 Click or drag an image here</span>
      <canvas id="processCanvas" style="display:none"></canvas>
    </div>
    <div id="imgControls" style="display:none">
      <div class="field">
        <label>B&W Threshold <span id="threshVal">128</span></label>
        <input type="range" id="threshold" min="0" max="255" value="128" oninput="updateThreshold(this.value)">
      </div>
      <div class="field checkbox-field">
        <input type="checkbox" id="stretchImg" onchange="renderImageSlot()">
        <label for="stretchImg" style="text-transform:none; letter-spacing:0; font-size:0.88rem; color:#ccc; cursor:pointer;">Stretch image to full label height (keep proportions)</label>
      </div>
      <div class="img-preview-row">
        <div>
          <div class="mini-label">Original</div>
          <img id="imgOriginal" class="thumb">
        </div>
        <div>
          <div class="mini-label">B&W Preview</div>
          <canvas id="previewCanvas" class="thumb"></canvas>
        </div>
        <button class="btn-remove" onclick="removeImage()">✕ Remove</button>
      </div>
    </div>

    <!-- BARCODE SETTINGS -->
    <div class="section-title" style="margin-top:22px">Barcode</div>
    <div class="field">
      <label>Barcode Value</label>
      <input id="val" type="text" placeholder="e.g. 012345678905" value="012345678905">
    </div>
    <div class="row">
      <div class="field">
        <label>Barcode Format</label>
        <select id="fmt">
          <option value="CODE128">Code 128 (general)</option>
          <option value="EAN13">EAN-13 (retail)</option>
          <option value="EAN8">EAN-8</option>
          <option value="UPC">UPC-A</option>
          <option value="CODE39">Code 39</option>
          <option value="ITF14">ITF-14 (shipping)</option>
        </select>
      </div>
      <div class="field">
        <label>Bar Color</label>
        <input id="barColor" type="color" value="#000000">
      </div>
    </div>

    <!-- LABEL TEXT -->
    <div class="section-title" style="margin-top:22px">Label Text</div>
    <div class="row">
      <div class="field">
        <label>Title</label>
        <input id="titleText" type="text" placeholder="e.g. Product Name">
      </div>
      <div class="field">
        <label>Subtitle</label>
        <input id="subtitleText" type="text" placeholder="e.g. SKU: A-001">
      </div>
    </div>

    <!-- SIZE -->
    <div class="section-title" style="margin-top:22px">Bar Size</div>
    <div class="row">
      <div class="field">
        <label>Bar Width (px)</label>
        <input id="barWidth" type="number" value="2" min="1" max="5">
      </div>
      <div class="field">
        <label>Bar Height (px)</label>
        <input id="barHeight" type="number" value="80" min="20" max="200">
      </div>
    </div>

    <button class="btn" onclick="generate()">Generate Label</button>
    <p class="error" id="err">⚠️ Invalid value for this barcode format.</p>
  </div>

  <!-- PREVIEW -->
  <div class="preview-card" id="preview">
    <h2>Preview</h2>
    <div id="label-output">
      <div id="img-slot"></div>
      <div id="barcode-slot">
        <div id="label-title"></div>
        <svg id="barcode"></svg>
        <div id="label-subtitle"></div>
      </div>
    </div>
    <div class="actions">
      <button class="btn-outline" onclick="downloadSVG()">⬇ Download SVG</button>
      <button class="btn-outline" onclick="downloadPNG()">⬇ Download PNG</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
